name: Build APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Locate project (supports either raw files or an uploaded VoiceChangerApp.zip)
        id: locate
        run: |
          if [ -f "build.gradle.kts" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          elif [ -f "VoiceChangerApp.zip" ]; then
            unzip -q VoiceChangerApp.zip -d extracted
            echo "dir=extracted/VoiceChangerApp" >> "$GITHUB_OUTPUT"
          else
            echo "Could not find build.gradle.kts or VoiceChangerApp.zip in repo root" >&2
            exit 1
          fi

      - name: Build debug APK
        working-directory: ${{ steps.locate.outputs.dir }}
        run: gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: voice-changer-debug-apk
          path: ${{ steps.locate.outputs.dir }}/app/build/outputs/apk/debug/*.apk
